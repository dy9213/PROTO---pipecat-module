<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voice Chat</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0f0f0f;
    --surface:   #1a1a1a;
    --surface2:  #242424;
    --border:    #2e2e2e;
    --text:      #e8e8e8;
    --text-dim:  #888;
    --accent:    #4f8ef7;
    --danger:    #e05555;
    --green:     #4caf50;
    --red:       #e05555;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 14px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── config bar ── */
  #config-bar {
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  #config-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    cursor: pointer;
    user-select: none;
    color: var(--text-dim);
    font-size: 12px;
  }
  #config-toggle:hover { color: var(--text); }
  #config-chevron { transition: transform 0.2s; font-size: 10px; }
  #config-bar.open #config-chevron { transform: rotate(180deg); }
  #config-panel {
    display: none;
    padding: 10px 14px 14px;
    gap: 8px;
    flex-direction: column;
  }
  #config-bar.open #config-panel { display: flex; }
  .endpoint-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .endpoint-row label {
    width: 36px;
    font-size: 11px;
    color: var(--text-dim);
    flex-shrink: 0;
  }
  .endpoint-row input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 10px;
    color: var(--text);
    font-size: 13px;
    outline: none;
  }
  .endpoint-row input:focus { border-color: var(--accent); }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--border);
    flex-shrink: 0;
  }
  .status-dot.ok  { background: var(--green); }
  .status-dot.err { background: var(--red); }

  .system-prompt-row {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .system-prompt-row label {
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .system-prompt-input {
    width: 100%;
    box-sizing: border-box;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 12px;
    font-family: inherit;
    padding: 6px 8px;
    resize: vertical;
    min-height: 60px;
    outline: none;
  }
  .system-prompt-input:focus { border-color: var(--accent); }

  .config-actions {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 2px;
  }
  .lang-toggle {
    display: flex;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }
  .lang-btn {
    padding: 5px 12px;
    background: transparent;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
  }
  .lang-btn.active {
    background: var(--accent);
    color: #fff;
  }
  #save-btn {
    padding: 5px 14px;
    background: var(--accent);
    border: none;
    border-radius: 6px;
    color: #fff;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
  }
  #save-btn:hover { opacity: 0.85; }
  #save-status { font-size: 11px; color: var(--text-dim); }

  /* ── chat list ── */
  #chat-list {
    flex: 1;
    overflow-y: auto;
    padding: 16px 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  #chat-list::-webkit-scrollbar { width: 4px; }
  #chat-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .bubble-wrap {
    display: flex;
    flex-direction: column;
  }
  .bubble-wrap.user  { align-items: flex-end; }
  .bubble-wrap.assistant { align-items: flex-start; }

  .bubble {
    max-width: 70%;
    padding: 9px 13px;
    border-radius: 14px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .bubble-wrap.user .bubble {
    background: #1e3a5f;
    border-bottom-right-radius: 4px;
  }
  .bubble-wrap.assistant .bubble {
    background: var(--surface2);
    border-bottom-left-radius: 4px;
  }
  .bubble-meta {
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 3px;
    padding: 0 4px;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .mic-icon { font-size: 10px; }

  /* typing indicator */
  .typing-dots { display: flex; gap: 4px; padding: 4px 0; }
  .typing-dots span {
    width: 6px; height: 6px;
    background: var(--text-dim);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); }
    40%            { transform: translateY(-5px); }
  }

  /* ── live overlay ── */
  #live-overlay {
    display: none;
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    transform: none;
    background: rgba(79, 142, 247, 0.12);
    border-top: 1px solid rgba(79, 142, 247, 0.35);
    padding: 10px 12px;
    text-align: center;
    backdrop-filter: blur(4px);
    z-index: 10;
  }
  #live-overlay.visible { display: block; }
  .live-label { font-size: 13px; font-weight: 600; color: var(--accent); margin-bottom: 4px; }
  .live-hint  { font-size: 11px; color: var(--text-dim); }
  .live-wave  {
    display: flex; gap: 3px; justify-content: center;
    align-items: center; height: 20px; margin-bottom: 6px;
  }
  .live-wave span {
    width: 3px; background: var(--accent); border-radius: 2px;
    animation: wave 1s ease-in-out infinite;
  }
  .live-wave span:nth-child(1) { height: 8px;  animation-delay: 0s; }
  .live-wave span:nth-child(2) { height: 16px; animation-delay: 0.15s; }
  .live-wave span:nth-child(3) { height: 20px; animation-delay: 0.3s; }
  .live-wave span:nth-child(4) { height: 16px; animation-delay: 0.45s; }
  .live-wave span:nth-child(5) { height: 8px;  animation-delay: 0.6s; }
  @keyframes wave {
    0%, 100% { transform: scaleY(0.5); }
    50%       { transform: scaleY(1.2); }
  }

  /* ── input bar ── */
  #input-bar {
    flex-shrink: 0;
    border-top: 1px solid var(--border);
    background: var(--surface);
    padding: 10px 12px;
    position: relative;
    transition: opacity 0.3s;
  }
  #input-bar.live-active { opacity: 0.2; pointer-events: none; }
  #input-bar.ptt-active  { opacity: 0.6; }

  .input-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  #mic-btn {
    width: 38px; height: 38px;
    border-radius: 50%;
    border: none;
    background: var(--surface2);
    color: var(--text-dim);
    font-size: 16px;
    cursor: default;
    display: flex; align-items: center; justify-content: center;
    position: relative;
    flex-shrink: 0;
    transition: background 0.2s;
  }
  /* 3-second arc — SVG overlay */
  #mic-btn svg {
    position: absolute; top: 0; left: 0;
    width: 38px; height: 38px;
    transform: rotate(-90deg);
    pointer-events: none;
  }
  #arc-track { stroke: transparent; fill: none; stroke-width: 3; }
  #arc-fill  {
    stroke: var(--danger); fill: none; stroke-width: 3;
    stroke-dasharray: 110;
    stroke-dashoffset: 110;
    stroke-linecap: round;
    transition: none;
  }
  .state-ptt-recording #mic-btn { background: rgba(76,175,80,0.15); color: var(--green); }
  .state-ptt-recording #mic-btn.vad-low { background: rgba(224,85,85,0.15); color: var(--danger); }
  .state-ptt-processing #mic-btn { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  #text-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    color: var(--text);
    font-size: 14px;
    outline: none;
    resize: none;
    height: 38px;
    line-height: 1.4;
  }
  #text-input:focus { border-color: var(--accent); }

  #send-btn {
    padding: 0 16px;
    height: 38px;
    background: var(--accent);
    border: none;
    border-radius: 8px;
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    flex-shrink: 0;
  }
  #send-btn:hover { opacity: 0.85; }
  #send-btn:disabled { opacity: 0.4; cursor: default; }

  #stop-btn {
    padding: 0 14px;
    height: 38px;
    background: transparent;
    border: 1px solid var(--danger);
    border-radius: 8px;
    color: var(--danger);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    flex-shrink: 0;
  }
  #stop-btn:hover { background: rgba(224,85,85,0.1); }

  #space-hint {
    font-size: 11px;
    color: var(--text-dim);
    text-align: center;
    margin-top: 5px;
  }
</style>
</head>
<body>

<!-- Config bar -->
<div id="config-bar">
  <div id="config-toggle" onclick="toggleConfig()">
    <span id="config-chevron">▼</span>
    <span>Config</span>
    <span id="config-warning" style="color:#e09944;font-size:11px;margin-left:6px;display:none">⚠ Not configured</span>
  </div>
  <div id="config-panel">
    <div class="endpoint-row">
      <label>STT</label>
      <input id="stt-input" type="text" placeholder="http://…" spellcheck="false">
      <div class="status-dot" id="dot-stt"></div>
    </div>
    <div class="endpoint-row">
      <label>LLM</label>
      <input id="llm-input" type="text" placeholder="http://…" spellcheck="false">
      <div class="status-dot" id="dot-llm"></div>
    </div>
    <div class="endpoint-row">
      <label>TTS</label>
      <input id="tts-input" type="text" placeholder="http://…" spellcheck="false">
      <div class="status-dot" id="dot-tts"></div>
    </div>
    <div class="endpoint-row">
      <label>Model</label>
      <input id="model-input" type="text" placeholder="model name" spellcheck="false">
      <div class="status-dot" style="visibility:hidden"></div>
    </div>
    <div class="endpoint-row">
      <label>Key</label>
      <input id="llm-key-input" type="password" placeholder="API key (optional)" spellcheck="false">
      <div class="status-dot" style="visibility:hidden"></div>
    </div>
    <div class="config-actions">
      <div class="lang-toggle">
        <button class="lang-btn active" id="lang-en" onclick="setLang('en')">EN</button>
        <button class="lang-btn"        id="lang-ja" onclick="setLang('ja')">JP</button>
        <button class="lang-btn"        id="lang-zh" onclick="setLang('zh')">ZH</button>
      </div>
      <button id="save-btn" onclick="saveEndpoints()">Save</button>
      <span id="save-status"></span>
    </div>
    <div class="system-prompt-row">
      <label>System Prompt — EN</label>
      <textarea id="system-prompt-en" class="system-prompt-input" placeholder="You are a helpful voice assistant. Respond concisely in English." spellcheck="false" rows="3"></textarea>
    </div>
    <div class="system-prompt-row" style="margin-top:6px">
      <label>System Prompt — JA</label>
      <textarea id="system-prompt-ja" class="system-prompt-input" placeholder="あなたは役立つ音声アシスタントです。日本語で簡潔に回答してください。" spellcheck="false" rows="3"></textarea>
    </div>
    <div class="system-prompt-row" style="margin-top:6px">
      <label>System Prompt — ZH</label>
      <textarea id="system-prompt-zh" class="system-prompt-input" placeholder="你是一个有用的语音助手。请用中文简洁地回答。" spellcheck="false" rows="3"></textarea>
    </div>
  </div>
</div>

<!-- Chat list -->
<div id="chat-list"></div>

<!-- Live overlay -->
<div id="live-overlay">
  <div class="live-wave">
    <span></span><span></span><span></span><span></span><span></span>
  </div>
  <div class="live-label">Listening — speak now</div>
  <div class="live-hint">Press SPACE to exit</div>
</div>

<!-- Input bar -->
<div id="input-bar">
  <div class="input-row">
    <div id="mic-btn">
      🎙
      <svg viewBox="0 0 38 38">
        <circle cx="19" cy="19" r="17" id="arc-track"/>
        <circle cx="19" cy="19" r="17" id="arc-fill"/>
      </svg>
    </div>
    <textarea id="text-input" placeholder="Type a message…" rows="1"></textarea>
    <button id="stop-btn" onclick="stopGeneration()" style="display:none">Stop</button>
<button id="send-btn" onclick="sendText()">Send</button>
  </div>
  <div id="space-hint">Hold SPACE to speak · Keep holding after speaking for live mode</div>
</div>

<script>
// ── constants ──────────────────────────────────────────────────────────────────
const LIVE_HOLD_MS            = 1500   // silence after speech ends to trigger live mode
const PTT_COOLDOWN_MS         = 800
const PTT_VAD_RMS             = 0.03   // RMS threshold for speech detection during PTT hold
const PTT_VAD_ONSET_CHUNKS    = 3      // consecutive above-threshold chunks to confirm speech (~60ms)
const PTT_VAD_SILENCE_CHUNKS  = 15     // consecutive below-threshold chunks to confirm speech end (~300ms)
const INTERRUPT_RMS_THRESHOLD = 0.08
const INTERRUPT_ONSET_CHUNKS  = 6
const API                     = 'http://127.0.0.1:8743'

// ── state ──────────────────────────────────────────────────────────────────────
const STATE = Object.freeze({ IDLE: 'IDLE', PTT_RECORDING: 'PTT_RECORDING',
                               PTT_PROCESSING: 'PTT_PROCESSING', LIVE_ACTIVE: 'LIVE_ACTIVE' })
let state            = STATE.IDLE
let liveModeToken    = null
let liveModeTimerId  = null   // setTimeout handle for VAD-driven live transition
let pttCooldownUntil = 0
let currentLang      = 'en'
let chatHistory      = []

// ── DOM refs ───────────────────────────────────────────────────────────────────
const chatList  = document.getElementById('chat-list')
const textInput = document.getElementById('text-input')
const inputBar  = document.getElementById('input-bar')
const liveOverlay = document.getElementById('live-overlay')
const arcFill   = document.getElementById('arc-fill')
const arcTrack  = document.getElementById('arc-track')

// ── settings ───────────────────────────────────────────────────────────────────
async function loadSettings() {
  try {
    const s = await window.api.getSettings()
    document.getElementById('stt-input').value           = s.stt_endpoint   || ''
    document.getElementById('llm-input').value           = s.llm_endpoint   || ''
    document.getElementById('tts-input').value           = s.tts_endpoint   || ''
    document.getElementById('model-input').value         = s.llm_model      || ''
    document.getElementById('llm-key-input').value       = s.llm_api_key    || ''
    document.getElementById('system-prompt-en').value = s.system_prompt_en || ''
    document.getElementById('system-prompt-ja').value = s.system_prompt_ja || ''
    document.getElementById('system-prompt-zh').value = s.system_prompt_zh || ''
    currentLang = s.language || 'en'
    updateLangUI()
    checkConfigWarning()
  } catch {}
}

function toggleConfig() {
  document.getElementById('config-bar').classList.toggle('open')
}

function setLang(lang) {
  currentLang = lang
  updateLangUI()
}

function updateLangUI() {
  document.getElementById('lang-en').classList.toggle('active', currentLang === 'en')
  document.getElementById('lang-ja').classList.toggle('active', currentLang === 'ja')
  document.getElementById('lang-zh').classList.toggle('active', currentLang === 'zh')
}

function checkConfigWarning() {
  const empty = !document.getElementById('stt-input').value ||
                !document.getElementById('llm-input').value ||
                !document.getElementById('tts-input').value
  document.getElementById('config-warning').style.display = empty ? '' : 'none'
  if (empty && !document.getElementById('config-bar').classList.contains('open')) {
    document.getElementById('config-bar').classList.add('open')
  }
}

async function saveEndpoints() {
  const s = {
    stt_endpoint:  document.getElementById('stt-input').value.trim(),
    llm_endpoint:  document.getElementById('llm-input').value.trim(),
    tts_endpoint:  document.getElementById('tts-input').value.trim(),
    llm_model:     document.getElementById('model-input').value.trim(),
    llm_api_key:   document.getElementById('llm-key-input').value.trim(),
    language:      currentLang,
    voice_en:      'Ryan',
    voice_ja:      'Ono_Anna',
    voice_zh:      'Vivian',
    system_prompt_en: document.getElementById('system-prompt-en').value.trim(),
    system_prompt_ja: document.getElementById('system-prompt-ja').value.trim(),
    system_prompt_zh: document.getElementById('system-prompt-zh').value.trim(),
  }
  document.getElementById('save-status').textContent = 'Saving…'
  try {
    const r = await fetch(`${API}/settings`, {
      method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(s),
    })
    const status = await r.json()
    setDot('stt', status.stt); setDot('llm', status.llm); setDot('tts', status.tts)
    document.getElementById('save-status').textContent = 'Saved'
    setTimeout(() => document.getElementById('save-status').textContent = '', 2000)
    checkConfigWarning()
  } catch {
    document.getElementById('save-status').textContent = 'Error'
  }
}

function setDot(key, ok) {
  const d = document.getElementById(`dot-${key}`)
  d.className = 'status-dot ' + (ok === true ? 'ok' : ok === false ? 'err' : '')
}

// ── chat ───────────────────────────────────────────────────────────────────────
function appendUserMessage(text, source = 'text') {
  const msg = { role: 'user', content: text, source, timestamp: Date.now() }
  chatHistory.push(msg)
  renderBubble(msg)
}

function startAssistantBubble() {
  const id = 'msg-' + Date.now()
  const wrap = document.createElement('div')
  wrap.className = 'bubble-wrap assistant'
  wrap.id = id
  const bubble = document.createElement('div')
  bubble.className = 'bubble'
  bubble.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>'
  wrap.appendChild(bubble)
  chatList.appendChild(wrap)
  scrollBottom()
  return id
}

function updateAssistantBubble(id, text, done = false) {
  const wrap = document.getElementById(id)
  if (!wrap) return
  const bubble = wrap.querySelector('.bubble')
  bubble.textContent = text
  if (done) {
    const meta = document.createElement('div')
    meta.className = 'bubble-meta'
    meta.textContent = fmtTime(Date.now())
    wrap.appendChild(meta)
  }
  scrollBottom()
}

function renderBubble(msg) {
  const wrap = document.createElement('div')
  wrap.className = `bubble-wrap ${msg.role}`
  const bubble = document.createElement('div')
  bubble.className = 'bubble'
  bubble.textContent = msg.content
  wrap.appendChild(bubble)
  const meta = document.createElement('div')
  meta.className = 'bubble-meta'
  if (msg.source === 'voice') meta.innerHTML = '<span class="mic-icon">🎙</span>'
  meta.append(fmtTime(msg.timestamp))
  wrap.appendChild(meta)
  chatList.appendChild(wrap)
  scrollBottom()
}

function fmtTime(ts) {
  return new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
}

function scrollBottom() {
  chatList.scrollTop = chatList.scrollHeight
}

// ── LLM streaming ──────────────────────────────────────────────────────────────
let llmAbortController = null

function abortLLM() {
  llmAbortController?.abort()
  llmAbortController = null
}

function setStopBtn(visible) {
  document.getElementById('stop-btn').style.display = visible ? '' : 'none'
  document.getElementById('send-btn').style.display = visible ? 'none' : ''
}

function stopGeneration() {
  abortLLM()
  // if in PTT_PROCESSING the processPTT finally block resets state;
  // for text mode we reset here since sendText() manages its own flow
  if (state === STATE.PTT_PROCESSING) return  // handled by processPTT finally
  setStopBtn(false)
  document.getElementById('send-btn').disabled = false
}

async function streamLLMResponse(userText) {
  const bubbleId = startAssistantBubble()
  let full = ''
  llmAbortController = new AbortController()
  setStopBtn(true)
  try {
    const r = await fetch(`${API}/chat/stream`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ message: userText, history: chatHistory.slice(-10), language: currentLang }),
      signal: llmAbortController.signal,
    })
    const reader = r.body.getReader()
    const dec = new TextDecoder()
    let buf = ''
    while (true) {
      const { done, value } = await reader.read()
      if (done) break
      buf += dec.decode(value, { stream: true })
      const lines = buf.split('\n')
      buf = lines.pop()
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue
        const d = line.slice(6)
        if (d === '[DONE]') break
        try {
          const tok = JSON.parse(d).choices?.[0]?.delta?.content
          if (tok) { full += tok; updateAssistantBubble(bubbleId, full) }
        } catch {}
      }
    }
  } catch (e) {
    if (e.name !== 'AbortError') throw e
    // aborted — return whatever streamed so far (may be empty)
  } finally {
    llmAbortController = null
  }
  setStopBtn(false)
  if (full) {
    updateAssistantBubble(bubbleId, full, true)
    chatHistory.push({ role: 'assistant', content: full, source: 'text', timestamp: Date.now() })
  } else {
    document.getElementById(bubbleId)?.remove()
  }
  return full
}

// ── text send ──────────────────────────────────────────────────────────────────
async function sendText() {
  const text = textInput.value.trim()
  if (!text) return
  textInput.value = ''
  appendUserMessage(text, 'text')
  document.getElementById('send-btn').disabled = true
  try {
    await streamLLMResponse(text)
  } catch (e) {
    if (e.name !== 'AbortError') console.error('LLM error', e)
  } finally {
    setStopBtn(false)
    document.getElementById('send-btn').disabled = false
  }
}

textInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendText() }
})

// ── unified PCM capture (AudioWorklet — shared by PTT and live mode) ───────────
let captureStream  = null
let captureCtx     = null
let captureWorklet = null
let captureChunks  = []   // ArrayBuffer[] of Int16 PCM
let workletURL     = null  // created once, reused

async function getWorkletURL() {
  if (workletURL) return workletURL
  workletURL = URL.createObjectURL(new Blob([`
    class PcmProcessor extends AudioWorkletProcessor {
      process(inputs) {
        const ch = inputs[0]?.[0]
        if (ch) {
          const f32 = new Float32Array(ch)
          this.port.postMessage(f32.buffer, [f32.buffer])
        }
        return true
      }
    }
    registerProcessor('pcm-processor', PcmProcessor)
  `], { type: 'application/javascript' }))
  return workletURL
}

async function startCapture() {
  captureStream = await navigator.mediaDevices.getUserMedia({
    audio: { sampleRate: 16000, channelCount: 1 },
  })
  captureCtx = new AudioContext({ sampleRate: 16000 })
  await captureCtx.audioWorklet.addModule(await getWorkletURL())
  captureWorklet = new AudioWorkletNode(captureCtx, 'pcm-processor')
  const src = captureCtx.createMediaStreamSource(captureStream)
  src.connect(captureWorklet)
  // Connect through a muted gain node to destination — prevents macOS from
  // auto-suspending the AudioContext when it has no audio output path.
  const silencer = captureCtx.createGain()
  silencer.gain.value = 0
  captureWorklet.connect(silencer)
  silencer.connect(captureCtx.destination)
  captureChunks = []
  captureWorklet.port.onmessage = (e) => captureChunks.push(e.data)
}

function stopCapture() {
  // stop buffering, tear down, return chunks for PTT use
  if (captureWorklet) { captureWorklet.port.onmessage = null; captureWorklet.disconnect() }
  if (captureCtx)     { captureCtx.close() }
  if (captureStream)  { captureStream.getTracks().forEach(t => t.stop()) }
  const chunks = captureChunks
  captureWorklet = null; captureCtx = null; captureStream = null; captureChunks = []
  return chunks
}

// encode Int16 PCM chunks → WAV ArrayBuffer (client-side, no ffmpeg needed for PTT)
function encodePcmToWav(chunks, sampleRate = 16000) {
  // chunks are Float32 buffers — convert to Int16 for WAV
  const totalSamples = chunks.reduce((s, c) => s + c.byteLength / 4, 0)
  const buf = new ArrayBuffer(44 + totalSamples * 2)
  const v   = new DataView(buf)
  const str = (off, s) => { for (let i = 0; i < s.length; i++) v.setUint8(off + i, s.charCodeAt(i)) }
  str(0, 'RIFF'); v.setUint32(4, 36 + totalSamples * 2, true)
  str(8, 'WAVE'); str(12, 'fmt ')
  v.setUint32(16, 16, true); v.setUint16(20, 1, true); v.setUint16(22, 1, true)
  v.setUint32(24, sampleRate, true); v.setUint32(28, sampleRate * 2, true)
  v.setUint16(32, 2, true); v.setUint16(34, 16, true)
  str(36, 'data'); v.setUint32(40, totalSamples * 2, true)
  let off = 44
  for (const c of chunks) {
    const f32 = new Float32Array(c)
    for (let i = 0; i < f32.length; i++) {
      v.setInt16(off, Math.max(-32768, Math.min(32767, f32[i] * 32767)), true)
      off += 2
    }
  }
  return buf
}

async function uploadPcmChunks(chunks) {
  const wav = encodePcmToWav(chunks)
  const fd  = new FormData()
  fd.append('audio', new Blob([wav], { type: 'audio/wav' }), 'recording.wav')
  fd.append('language', currentLang)
  const r = await fetch(`${API}/stt`, { method: 'POST', body: fd })
  if (!r.ok) throw new Error(`STT error ${r.status}`)
  return (await r.json()).transcript || ''
}

// ── PTT audio playback ─────────────────────────────────────────────────────────
let audioCtx = null
function getAudioCtx() {
  if (!audioCtx) audioCtx = new AudioContext()
  return audioCtx
}

let pttAudioSrc = null

function stopPTTAudio() {
  if (pttAudioSrc) { try { pttAudioSrc.stop() } catch {} ; pttAudioSrc = null }
}

async function fetchAndPlayTTS(text) {
  const r = await fetch(`${API}/tts`, {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ text, language: currentLang }),
  })
  if (!r.ok) throw new Error(`TTS error ${r.status}`)
  const buf = await r.arrayBuffer()
  const ctx = getAudioCtx()
  const decoded = await ctx.decodeAudioData(buf)
  const src = ctx.createBufferSource()
  src.buffer = decoded
  src.connect(ctx.destination)
  pttAudioSrc = src
  src.onended = () => { pttAudioSrc = null }
  src.start()
  return new Promise((res) => { src.onended = () => { pttAudioSrc = null; res() } })
}

// ── UI state helpers ───────────────────────────────────────────────────────────
function setState(s) { state = s; applyStateUI() }

function applyStateUI() {
  inputBar.className = 'state-' + state.toLowerCase().replace('_', '-')
    .replace('ptt-recording', 'recording').replace('ptt-processing', 'processing')
  // input bar opacity
  inputBar.classList.remove('live-active', 'ptt-active')
  if (state === STATE.LIVE_ACTIVE)    inputBar.classList.add('live-active')
  if (state === STATE.PTT_RECORDING || state === STATE.PTT_PROCESSING) inputBar.classList.add('ptt-active')
  // live overlay
  liveOverlay.classList.toggle('visible', state === STATE.LIVE_ACTIVE)
  // arc is driven by VAD-low detection, not state change — reset on any non-recording state
  if (state === STATE.PTT_RECORDING) {
    showListeningRing()
  } else {
    resetArc()
    document.getElementById('mic-btn').classList.remove('vad-low')
  }
}

function isPTTEligible() {
  if (document.activeElement === textInput) return false
  if (Date.now() < pttCooldownUntil) return false
  return true
}

// ── processPTT ─────────────────────────────────────────────────────────────────
async function processPTT(chunks) {
  try {
    if (!chunks || chunks.length === 0) return
    const transcript = await uploadPcmChunks(chunks)
    if (state !== STATE.PTT_PROCESSING) return   // aborted
    if (!transcript.trim()) return
    appendUserMessage(transcript, 'voice')
    const assistantText = await streamLLMResponse(transcript)
    if (state !== STATE.PTT_PROCESSING) return   // aborted mid-LLM
    if (assistantText) await fetchAndPlayTTS(assistantText)
  } catch (e) {
    console.error('PTT pipeline error', e)
  } finally {
    // only reset if we still own the state — an interrupt may have already moved it on
    if (state === STATE.PTT_PROCESSING) setState(STATE.IDLE)
  }
}

async function beginPTTRecording() {
  setState(STATE.PTT_RECORDING)
  await startCapture()

  // state can change while awaiting mic permission (e.g. keyup or abort fired)
  if (state !== STATE.PTT_RECORDING) { stopCapture(); return }

  let pttSpeechDetected = false
  let pttOnsetCount     = 0
  let pttSilenceCount   = 0

  captureWorklet.port.onmessage = (ev) => {
    captureChunks.push(ev.data)

    const samples = new Float32Array(ev.data)
    let sum = 0
    for (const s of samples) sum += s * s
    const above = Math.sqrt(sum / samples.length) >= PTT_VAD_RMS

    if (!pttSpeechDetected) {
      if (above) {
        if (++pttOnsetCount >= PTT_VAD_ONSET_CHUNKS) {
          pttSpeechDetected = true
          pttSilenceCount   = 0
          pttOnsetCount     = 0
        }
      } else {
        pttOnsetCount = 0
      }
    } else {
      if (above) {
        pttSilenceCount = 0
        if (liveModeTimerId !== null) cancelLiveModeTimer()
      } else {
        if (++pttSilenceCount >= PTT_VAD_SILENCE_CHUNKS && liveModeTimerId === null) {
          startLiveModeTimer()
        }
      }
    }
  }
}

// ── live mode ──────────────────────────────────────────────────────────────────
let liveWS            = null
let liveQueuedSrcs    = []
let livePlaybackGated = false  // true only while TTS is playing — gates binary audio
let liveInterruptSent = false  // prevent duplicate interrupt messages per TTS turn
let interruptStreak   = 0      // consecutive above-threshold chunks during TTS
let _liveTurnText     = ''     // accumulates assistant tokens for the current live turn

// preBuffer: PCM ArrayBuffer[] captured during PTT_RECORDING before live transition
async function enterLiveMode(preBuffer = []) {
  try {
    // captureStream/captureCtx/captureWorklet are already running from startCapture()
    console.log(`[live] enterLiveMode captureWorklet=${!!captureWorklet} captureCtx=${!!captureCtx} captureStream=${!!captureStream} preBuffer=${preBuffer.length}`)

    liveWS = new WebSocket(`ws://127.0.0.1:8743/live`)
    liveWS.binaryType = 'arraybuffer'
    const ws = liveWS  // snapshot — guards stale callbacks if liveWS is replaced before close

    function sendAudioChunk(pcmBuffer) {
      if (ws?.readyState === WebSocket.OPEN) ws.send(pcmBuffer)
    }

    function triggerInterrupt() {
      if (liveInterruptSent) return
      liveInterruptSent = true
      if (ws?.readyState === WebSocket.OPEN)
        ws.send(JSON.stringify({ type: 'interrupt' }))
    }

    ws.onopen = async () => {
      console.log(`[live] ws.onopen isStale=${liveWS !== ws} captureWorklet=${!!captureWorklet} ctxState=${captureCtx?.state}`)
      if (liveWS !== ws) { ws.close(); return }  // replaced by a newer session — discard
      ws.send(JSON.stringify({
        type: 'audio_config', sample_rate: 16000, channels: 1,
        history: chatHistory.slice(-10).map(m => ({ role: m.role, content: m.content })),
      }))
      for (const chunk of preBuffer) ws.send(chunk)

      if (!captureWorklet) { console.error('[live] captureWorklet is null in onopen'); ws.close(); return }

      // ensure the AudioContext is running — it may have auto-suspended on macOS
      if (captureCtx && captureCtx.state !== 'running') {
        console.log(`[live] resuming captureCtx (state=${captureCtx.state})`)
        await captureCtx.resume()
      }

      // single always-on handler — interrupt detection active whenever audio is actually playing
      let _chunksSinceSuspendCheck = 0
      captureWorklet.port.onmessage = (ev) => {
        if (!(ev.data instanceof ArrayBuffer)) return
        // periodically check for context suspension (every ~1s) and resume if needed
        if (++_chunksSinceSuspendCheck >= 125) {
          _chunksSinceSuspendCheck = 0
          if (captureCtx && captureCtx.state !== 'running') captureCtx.resume()
        }
        sendAudioChunk(ev.data)
        if (liveQueuedSrcs.length === 0) { interruptStreak = 0; return }
        const samples = new Float32Array(ev.data)
        let sum = 0
        for (const s of samples) sum += s * s
        if (Math.sqrt(sum / samples.length) > INTERRUPT_RMS_THRESHOLD) {
          interruptStreak++
          if (interruptStreak >= INTERRUPT_ONSET_CHUNKS) {
            cancelLivePlayback()
            triggerInterrupt()
          }
        } else {
          interruptStreak = 0
        }
      }
    }

    ws.onmessage = async (e) => {
      if (liveWS !== ws) return  // stale
      if (e.data instanceof ArrayBuffer) {
        // WAV chunk from backend — discard if not in a TTS turn
        if (!livePlaybackGated) return
        try {
          const ctx = getAudioCtx()
          await ctx.resume()
          const decoded = await ctx.decodeAudioData(e.data.slice(0))
          // discard only if an interrupt was triggered while decoding (not on natural tts_end)
          if (liveInterruptSent) return
          const node = ctx.createBufferSource()
          node.buffer = decoded
          node.connect(ctx.destination)
          node.start()
          liveQueuedSrcs.push(node)
          node.onended = () => { liveQueuedSrcs = liveQueuedSrcs.filter(s => s !== node) }
        } catch {}
        return
      }
      try {
        const msg = JSON.parse(e.data)
        if (msg.type === 'transcript' && msg.final) {
          appendUserMessage(msg.text, 'voice')
          startAssistantBubble()
        } else if (msg.type === 'token') {
          _liveTurnText += msg.text
          const bubbles = chatList.querySelectorAll('.bubble-wrap.assistant')
          const last = bubbles[bubbles.length - 1]
          if (last) {
            const b = last.querySelector('.bubble')
            if (b) { b.textContent += msg.text; scrollBottom() }
          }
        } else if (msg.type === 'tts_start') {
          cancelLivePlayback()   // stop any leftover audio from previous turn
          _liveTurnText = ''
          livePlaybackGated = true
          liveInterruptSent = false
          interruptStreak = 0
        } else if (msg.type === 'tts_end') {
          if (_liveTurnText)
            chatHistory.push({ role: 'assistant', content: _liveTurnText, source: 'voice', timestamp: Date.now() })
          _liveTurnText = ''
          livePlaybackGated = false
          liveInterruptSent = false
          interruptStreak = 0
        } else if (msg.type === 'interrupted') {
          livePlaybackGated = false
          liveInterruptSent = false
          interruptStreak = 0
        } else if (msg.type === 'error') {
          console.error('Live error:', msg.message)
          appendUserMessage('[Live mode error: ' + msg.message + ']', 'voice')
          exitLiveMode()
        }
      } catch {}
    }

    ws.onclose = (ev) => {
      console.log(`[live] ws.onclose isStale=${liveWS !== ws} code=${ev.code} reason="${ev.reason}" state=${state}`)
      if (liveWS !== ws) return  // stale WS — a newer session owns liveWS now
      if (state === STATE.LIVE_ACTIVE) setState(STATE.IDLE)
      cleanupLive()
    }

    ws.onerror = (ev) => {
      console.log(`[live] ws.onerror isStale=${liveWS !== ws} state=${state}`)
      if (liveWS !== ws) return  // stale
      if (state === STATE.LIVE_ACTIVE) setState(STATE.IDLE)
      cleanupLive()
    }

  } catch (e) {
    console.error('Live mode failed to start', e)
    setState(STATE.IDLE)
    cleanupLive()
  }
}

function cancelLivePlayback() {
  for (const src of liveQueuedSrcs) { try { src.stop() } catch {} }
  liveQueuedSrcs = []
}

function cleanupLive() {
  console.log('[live] cleanupLive called from:'); console.trace()
  livePlaybackGated = false
  liveInterruptSent = false
  interruptStreak = 0
  cancelLivePlayback()
  // tear down shared capture
  if (captureWorklet) { captureWorklet.port.onmessage = null; captureWorklet.disconnect(); captureWorklet = null }
  if (captureCtx)     { captureCtx.close(); captureCtx = null }
  if (captureStream)  { captureStream.getTracks().forEach(t => t.stop()); captureStream = null }
  captureChunks = []
  if (liveWS && liveWS.readyState !== WebSocket.CLOSED) { liveWS.close(); liveWS = null }
}

function exitLiveMode() {
  cleanupLive()
  pttCooldownUntil = Date.now() + PTT_COOLDOWN_MS
  setState(STATE.IDLE)
}

// ── arc helpers ────────────────────────────────────────────────────────────────
function showListeningRing() {
  arcTrack.style.stroke = 'var(--green)'
  arcFill.style.transition = 'none'
  arcFill.style.strokeDashoffset = '110'
}

function startArc(durationMs) {
  // switch track off, run red fill arc
  arcTrack.style.stroke = 'transparent'
  arcFill.style.transition = 'none'
  arcFill.style.strokeDashoffset = '110'
  arcFill.getBoundingClientRect()
  arcFill.style.transition = `stroke-dashoffset ${durationMs}ms linear`
  arcFill.style.strokeDashoffset = '0'
}

function resetArc() {
  arcTrack.style.stroke = 'transparent'
  arcFill.style.transition = 'none'
  arcFill.style.strokeDashoffset = '110'
}

// ── VAD-driven live mode timer ─────────────────────────────────────────────────
function startLiveModeTimer() {
  const token = Symbol()
  liveModeToken = token
  document.getElementById('mic-btn').classList.add('vad-low')
  startArc(LIVE_HOLD_MS)
  liveModeTimerId = setTimeout(() => {
    liveModeTimerId = null
    // always silence VAD handler when timer fires — prevents arc loop on early return
    if (captureWorklet) captureWorklet.port.onmessage = null
    console.log(`[live] timer fired tokenMatch=${liveModeToken === token} state=${state} captureWorklet=${!!captureWorklet}`)
    if (liveModeToken !== token) return       // keyup or speech-resume invalidated token
    if (state !== STATE.PTT_RECORDING) { stopCapture(); return }  // state drifted (orphaned session)
    liveModeToken = null
    const preBuffer = captureChunks.slice()  // hand off PTT audio — backend VAD will pick up the speech
    captureChunks.length = 0
    setState(STATE.LIVE_ACTIVE)
    enterLiveMode(preBuffer)
  }, LIVE_HOLD_MS)
}

function cancelLiveModeTimer() {
  clearTimeout(liveModeTimerId)
  liveModeTimerId = null
  liveModeToken = null
  document.getElementById('mic-btn').classList.remove('vad-low')
  resetArc()
}

// ── space bar state machine ────────────────────────────────────────────────────
document.addEventListener('keydown', async (e) => {
  if (e.code !== 'Space') return
  if (e.repeat) return
  if (document.getElementById('config-bar').classList.contains('open')) return
  if (state === STATE.LIVE_ACTIVE) {
    exitLiveMode()
    return
  }
  if (state === STATE.PTT_PROCESSING) {
    abortLLM()          // cancel in-flight LLM request
    stopPTTAudio()      // cut TTS playback if already in that phase
    // set IDLE directly so processPTT's finally guard won't clobber the new recording state
    state = STATE.IDLE
    beginPTTRecording()
    return
  }
  if (state !== STATE.IDLE) return
  if (!isPTTEligible()) return

  beginPTTRecording()
})

document.addEventListener('keyup', async (e) => {
  if (e.code !== 'Space') return

  liveModeToken = null                 // invalidate cancel token — synchronous
  if (liveModeTimerId !== null) {
    clearTimeout(liveModeTimerId)
    liveModeTimerId = null
  }

  if (state === STATE.PTT_RECORDING) {
    pttCooldownUntil = Date.now() + PTT_COOLDOWN_MS
    setState(STATE.PTT_PROCESSING)
    const chunks = stopCapture()   // tears down mic, returns buffered PCM chunks
    processPTT(chunks)             // fire-and-forget; finally resets to IDLE
  }
  // LIVE_ACTIVE exit handled on keydown (tap)
  // any other state: no-op
})

// ── init ───────────────────────────────────────────────────────────────────────
loadSettings()
</script>
</body>
